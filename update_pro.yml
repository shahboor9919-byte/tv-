name: IPTV Update (6-hourly)

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore stream cache DB
        uses: actions/cache@v4
        with:
          path: stream_cache.db
          key: stream-cache-${{ github.run_id }}
          restore-keys: |
            stream-cache-

      - name: Run aggregator
        run: python main.py --config config.yaml

      - name: Commit updated playlists
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlists/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update playlists [skip ci]" && git push)

      - name: Save stream cache DB
        uses: actions/cache@v4
        with:
          path: stream_cache.db
          key: stream-cache-${{ github.run_id }}
